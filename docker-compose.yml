# BASE stack — production-shaped. No bind mounts, no `command:` overrides; each
# service runs its image's own CMD (the Dockerfile `prod` target).
#
#   docker compose up -d                  → base + docker-compose.override.yml
#                                           (the DEV stack: hot reload, bind
#                                           mounts. The override is picked up
#                                           automatically — that's the point.)
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait
#                                         → CI/prod-shaped, override excluded
#
# Dependencies are installed in the IMAGE (see the Dockerfiles), never in a
# container start command. That is why a cold boot is fast now. The tradeoff:
# a package.json change needs `--build`, not just a restart.

services:
  db:
    image: postgres:15-alpine
    container_name: foodtracker-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: foodtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodtracker"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: foodtracker-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: foodtracker-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:password@db:5432/foodtracker
      - REDIS_URL=redis://redis:6379
      - UPLOAD_DIR=/data/uploads
      - FDC_API_KEY=${FDC_API_KEY}
      # Default postal code for Flipp flyer scrapes (per-request override allowed)
      - FLIPP_POSTAL_CODE=${FLIPP_POSTAL_CODE:-V5A3J2}
      # AI meal drafting (POST /api/meals/generate) via OpenRouter chat models.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Text model pool (meal/tag/merge) — comma-separated free/paid lists; the
      # text half of the 4-list model-pool contract. Empty FREE list seeds from
      # MEAL_MODEL. See backend/src/modelPool.ts.
      - FREE_TEXT_MODELS=${FREE_TEXT_MODELS:-}
      - PAID_TEXT_MODELS=${PAID_TEXT_MODELS:-}
      - USE_PAID_MODELS=${USE_PAID_MODELS:-false}
      - MEAL_MODEL=${MEAL_MODEL:-google/gemini-2.5-flash}
      # Single-model overrides for the tagger / duplicate-finder (bypass the pool).
      - TAG_MODEL=${TAG_MODEL:-}
      - MERGE_MODEL=${MERGE_MODEL:-}
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 15s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
      target: prod
    container_name: foodtracker-worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/foodtracker
      - REDIS_URL=redis://redis:6379
      - OCR_SERVICE_URL=http://ocr-service:8000
      # Image model pool — the worker selects one model per scan and runs many
      # scans in parallel (concurrency = pool size). Comma-separated free/paid
      # lists (the image half of the 4-list model-pool contract). Empty FREE list
      # seeds from OCR_MODEL. See worker/src/modelPool.ts.
      - FREE_IMAGE_MODELS=${FREE_IMAGE_MODELS:-}
      - PAID_IMAGE_MODELS=${PAID_IMAGE_MODELS:-}
      - USE_PAID_MODELS=${USE_PAID_MODELS:-false}
      - OCR_MODEL=${OCR_MODEL:-nvidia/nemotron-nano-12b-v2-vl:free}
      - OCR_MAX_ATTEMPTS=${OCR_MAX_ATTEMPTS:-3}
      # Scraped prices are written through the backend REST API so they get
      # normalization, food_prices join rows, and audit entries.
      - BACKEND_URL=http://backend:4000
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: foodtracker-ocr
    restart: always
    ports:
      # Loopback-only so it's curl-able from the host but not LAN-exposed;
      # other services reach it at http://ocr-service:8000
      - "127.0.0.1:8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OCR_MODEL=${OCR_MODEL:-nvidia/nemotron-nano-12b-v2-vl:free}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        # NEXT_PUBLIC_* is baked in at build time — override for a real deploy.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: foodtracker-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  uploads:
