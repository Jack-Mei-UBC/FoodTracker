name: smoke

# Boots the stack and runs the same read-only contract checks the local Stop
# hook runs — so "every change is verified" is enforced in CI, not just on my
# machine. Only the services the smoke tests need are built (db, redis, backend,
# frontend); the heavier worker/OCR images are skipped for speed.

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build db redis backend frontend

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4000/api/health >/dev/null 2>&1; then
              echo "backend healthy"; exit 0
            fi
            sleep 3
          done
          echo "backend never became healthy"; docker compose logs backend | tail -120; exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/ || true)
            if [ "$code" = "200" ]; then echo "frontend up"; exit 0; fi
            sleep 3
          done
          echo "frontend did not come up in time (page checks will be skipped)"

      - name: Run smoke tests
        env:
          STRICT: "1"
        run: bash scripts/smoke-test.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -300
