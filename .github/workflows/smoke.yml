name: smoke

# Boots the stack and runs the same read-only contract checks the local Stop
# hook runs — so "every change is verified" is enforced in CI, not just on my
# machine. Only the services the smoke tests need are built (db, redis, backend,
# frontend); the heavier worker/OCR images are skipped for speed.
#
# Two deliberate choices:
#   * `-f docker-compose.yml -f docker-compose.ci.yml` names both files, which
#     SUPPRESSES the automatic docker-compose.override.yml — so CI builds the
#     `prod` image targets with no bind mounts and no dev watcher. A frontend
#     build error now fails CI at the build step; under the old dev-mode CI the
#     pages compiled lazily and a build error could never surface.
#   * `--wait` blocks until every healthcheck passes, replacing the hand-rolled
#     curl poll loops this workflow used to carry.

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start stack (prod-shaped, dev override excluded)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d --build --wait db redis backend frontend

      # A fresh volume boots an EMPTY catalog — db/schema.sql ships no seed data
      # (its inserts are commented out). Without this step every catalog-dependent
      # assertion would skip, which is how the suite silently lost coverage.
      - name: Seed fixtures
        run: node frontend/e2e/fixtures/seed.mjs

      - name: Run smoke tests
        env:
          STRICT: "1"
        run: bash scripts/smoke-test.sh

      # UI test net (Playwright). Runs against the same prod-shaped stack the
      # smoke tests just checked. Layers 1-2 only for now: route smoke and the
      # style-agnostic interaction contracts. See frontend/e2e/README.md.
      - name: Install Playwright
        working-directory: frontend
        run: |
          npm ci --prefer-offline --no-audit || npm install --no-audit
          npx playwright install --with-deps chromium

      - name: Run UI tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            logs --no-color | tail -300
